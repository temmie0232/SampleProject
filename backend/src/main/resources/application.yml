server:
  port: 8080

spring:
  application:
    name: simplelibrary
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: ${MAX_UPLOAD_SIZE_MB:10}MB
      max-request-size: ${MAX_UPLOAD_SIZE_MB:10}MB
  jackson:
    time-zone: UTC
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
  flyway:
    enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:dev-secret-change-me}
    expires-seconds: ${JWT_EXPIRES_SECONDS:900}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
    max-size-mb: ${MAX_UPLOAD_SIZE_MB:10}
  bootstrap:
    enabled: ${BOOTSTRAP_ENABLED:true}
    admin-email: ${BOOTSTRAP_ADMIN_EMAIL:admin@example.com}
    admin-password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin123!}
    admin-display-name: ${BOOTSTRAP_ADMIN_DISPLAY_NAME:Admin}
