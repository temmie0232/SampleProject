spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:simplelibrary}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:password}
  jpa:
    show-sql: false

logging:
  level:
    org.hibernate.SQL: info
    org.hibernate.type.descriptor.sql: warn

